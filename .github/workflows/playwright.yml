name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]  # rulare paralelă

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: |
          pytest tests/ \
            --browser-name ${{ matrix.browser }} \
            --html=reports/report-${{ matrix.browser }}.html \
            --self-contained-html \
            -v

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()   # upload chiar dacă testele pică
        with:
          name: report-${{ matrix.browser }}
          path: reports/report-${{ matrix.browser }}.html